<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云控卡密系统 - 管理后台</title>
<style>
* { margin:0; padding:0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }
.header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); position: fixed; top:0; left:0; right:0; z-index:100; }
.header h1 { font-size: 20px; font-weight: 600; }
.header .user-info { font-size: 14px; opacity: 0.9; }
.login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #1a73e8, #0d47a1); }
.login-box { background: white; border-radius: 12px; padding: 48px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-box h2 { text-align: center; margin-bottom: 8px; color: #1a73e8; font-size: 24px; }
.login-box p { text-align: center; color: #888; margin-bottom: 32px; font-size: 14px; }
.login-box input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; margin-bottom: 20px; transition: border-color 0.2s; }
.login-box input:focus { outline: none; border-color: #1a73e8; }
.login-box button { width: 100%; padding: 12px; background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.login-box button:hover { opacity: 0.9; }
.error-msg { color: #e53935; font-size: 13px; margin-bottom: 12px; text-align: center; display: none; }
.main-container { display: none; }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: #1a237e; color: white; padding-top: 72px; z-index: 10; }
.sidebar-item { padding: 14px 24px; cursor: pointer; transition: background 0.2s; font-size: 14px; display: flex; align-items: center; gap: 10px; }
.sidebar-item:hover { background: rgba(255,255,255,0.1); }
.sidebar-item.active { background: rgba(255,255,255,0.15); border-left: 4px solid #64b5f6; }
.sidebar-item .icon { font-size: 18px; width: 24px; text-align: center; }
.content { margin-left: 220px; padding: 84px 32px 32px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
.stat-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.2s; }
.stat-card:hover { transform: translateY(-2px); }
.stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
.stat-card .value { font-size: 32px; font-weight: 700; }
.stat-card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }
.card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #333; display: flex; align-items: center; gap: 8px; }
.btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: opacity 0.2s; font-weight: 500; }
.btn-primary { background: #1a73e8; color: white; }
.btn-success { background: #43a047; color: white; }
.btn-warning { background: #fb8c00; color: white; }
.btn-danger { background: #e53935; color: white; }
.btn-info { background: #00acc1; color: white; }
.btn:hover { opacity: 0.85; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-copy { background: #5c6bc0; color: white; }
input, select { padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; }
input:focus, select:focus { outline: none; border-color: #1a73e8; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f5f5f5; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e0e0e0; }
td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
tr:hover { background: #f8f9ff; }
.status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 500; }
.status-0 { background: #e3f2fd; color: #1565c0; }
.status-1 { background: #e8f5e9; color: #2e7d32; }
.status-2 { background: #fce4ec; color: #c62828; }
.status-3 { background: #f5f5f5; color: #757575; }
.online-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.online-dot.online { background: #43a047; box-shadow: 0 0 6px #43a047; }
.online-dot.offline { background: #bdbdbd; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
.modal-overlay.active { display: flex; }
.modal { background: white; border-radius: 12px; padding: 32px; min-width: 400px; max-width: 600px; max-height: 80vh; overflow-y: auto; }
.modal h3 { margin-bottom: 20px; color: #1a73e8; }
.modal .form-group { margin-bottom: 16px; }
.modal .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #666; }
.modal .form-group input, .modal .form-group select { width: 100%; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
.toast { position: fixed; top: 80px; right: 32px; padding: 12px 20px; border-radius: 8px; color: white; font-size: 14px; z-index: 2000; animation: slideIn 0.3s; }
.toast-success { background: #43a047; }
.toast-error { background: #e53935; }
.toast-info { background: #1a73e8; }
@keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: none; opacity: 1; } }
.search-bar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.pagination { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
.pagination button { padding: 6px 12px; }
.tag { display: inline-block; padding: 2px 6px; background: #f0f0f0; border-radius: 4px; font-size: 12px; color: #666; }
.cards-result { background: #f8f9ff; border-radius: 8px; padding: 16px; margin-top: 16px; max-height: 300px; overflow-y: auto; }
.cards-result .card-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: white; border-radius: 6px; margin-bottom: 8px; font-family: monospace; font-size: 13px; }
.cards-result .card-item:last-child { margin-bottom: 0; }
.heartbeat-badge { font-size: 11px; padding: 2px 6px; border-radius: 8px; }
.heartbeat-badge.online { background: #e8f5e9; color: #2e7d32; }
.heartbeat-badge.offline { background: #f5f5f5; color: #999; }
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-container" id="loginPage">
  <div class="login-box">
    <h2>🔒 云控卡密系统</h2>
    <p>管理后台登录</p>
    <div class="error-msg" id="loginError">密钥错误，请重试</div>
    <input type="password" id="adminKeyInput" placeholder="请输入管理员密钥 (Admin Key)" autofocus>
    <button onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- 主界面 -->
<div class="main-container" id="mainPage">
  <div class="header">
    <h1>☁️ 云控卡密系统 - 管理后台</h1>
    <div class="user-info">
      <span id="loginStatus">已登录</span>
      <button class="btn btn-sm btn-danger" style="margin-left:12px" onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-item active" onclick="switchTab('dashboard', this)">
      <span class="icon">📊</span> 仪表盘
    </div>
    <div class="sidebar-item" onclick="switchTab('cards', this)">
      <span class="icon">🔑</span> 卡密管理
    </div>
    <div class="sidebar-item" onclick="switchTab('online', this)">
      <span class="icon">🟢</span> 在线设备
    </div>
    <div class="sidebar-item" onclick="switchTab('logs', this)">
      <span class="icon">📝</span> 审计日志
    </div>
    <div class="sidebar-item" onclick="switchTab('whitelist', this)">
      <span class="icon">🛡️</span> IP白名单
    </div>
  </div>

  <div class="content">
    <!-- 仪表盘 -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card" onclick="switchTab('cards', document.querySelectorAll('.sidebar-item')[1])">
          <div class="label">卡密总数</div><div class="value" id="statTotal">-</div>
        </div>
        <div class="stat-card" style="cursor:pointer" onclick="switchTab('online', document.querySelectorAll('.sidebar-item')[2])">
          <div class="label">在线设备</div><div class="value" id="statOnline">-</div>
        </div>
        <div class="stat-card">
          <div class="label">已激活</div><div class="value" id="statActive">-</div>
        </div>
        <div class="stat-card">
          <div class="label">已禁用</div><div class="value" id="statDisabled">-</div>
        </div>
        <div class="stat-card">
          <div class="label">已过期</div><div class="value" id="statExpired">-</div>
        </div>
        <div class="stat-card">
          <div class="label">验证成功</div><div class="value" id="statVerifySuccess">-</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">快捷操作</div>
        <button class="btn btn-primary" onclick="switchTab('cards', document.querySelectorAll('.sidebar-item')[1])">管理卡密</button>
        <button class="btn btn-success" style="margin-left:12px" onclick="showGenerateModal()">生成新卡密</button>
        <button class="btn btn-info" style="margin-left:12px" onclick="switchTab('online', document.querySelectorAll('.sidebar-item')[2])">查看在线设备</button>
      </div>
    </div>

    <!-- 卡密管理 -->
    <div class="tab-content" id="tab-cards">
      <div class="card">
        <div class="card-title">卡密列表</div>
        <div class="search-bar">
          <select id="filterStatus" onchange="loadCards()">
            <option value="">全部状态</option>
            <option value="0">未使用</option>
            <option value="1">已激活</option>
            <option value="2">已禁用</option>
            <option value="3">已过期</option>
          </select>
          <input type="text" id="searchKey" placeholder="搜索卡密..." style="width:200px">
          <button class="btn btn-info btn-sm" onclick="loadCards()">搜索</button>
          <button class="btn btn-success btn-sm" onclick="showGenerateModal()">生成卡密</button>
          <button class="btn btn-primary btn-sm" onclick="showImportModal()">批量导入</button>
          <button class="btn btn-info btn-sm" onclick="doExport()">导出CSV</button>
        </div>
        <table>
          <thead><tr><th>卡密</th><th>状态</th><th>在线状态</th><th>有效期</th><th>过期时间</th><th>绑定设备</th><th>创建时间</th><th>操作</th></tr></thead>
          <tbody id="cardsTable"></tbody>
        </table>
        <div class="pagination" id="cardsPagination"></div>
      </div>
    </div>

    <!-- 在线设备 -->
    <div class="tab-content" id="tab-online">
      <div class="card">
        <div class="card-title">在线设备列表 <button class="btn btn-sm btn-info" style="margin-left:12px" onclick="loadOnlineDevices()">刷新</button></div>
        <table>
          <thead><tr><th>状态</th><th>设备SN</th><th>IP地址</th><th>使用卡密</th><th>卡密状态</th><th>剩余时间</th><th>最后心跳</th></tr></thead>
          <tbody id="onlineTable"></tbody>
        </table>
        <div id="onlineEmpty" style="text-align:center;padding:32px;color:#aaa;display:none">暂无在线设备</div>
      </div>
    </div>

    <!-- 审计日志 -->
    <div class="tab-content" id="tab-logs">
      <div class="card">
        <div class="card-title">管理员操作审计日志</div>
        <table>
          <thead><tr><th>时间</th><th>管理员</th><th>操作</th><th>详情</th><th>IP地址</th></tr></thead>
          <tbody id="logsTable"></tbody>
        </table>
      </div>
    </div>

    <!-- IP白名单 -->
    <div class="tab-content" id="tab-whitelist">
      <div class="card">
        <div class="card-title">IP白名单管理</div>
        <div class="search-bar">
          <span class="tag" id="whitelistStatus">状态：加载中...</span>
          <button class="btn btn-success btn-sm" onclick="showWhitelistAddModal()">添加白名单</button>
        </div>
        <table>
          <thead><tr><th>CIDR</th><th>描述</th><th>添加时间</th><th>操作</th></tr></thead>
          <tbody id="whitelistTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 生成卡密弹窗 -->
<div class="modal-overlay" id="generateModal">
  <div class="modal">
    <h3>生成卡密</h3>
    <div class="form-group">
      <label>有效期（天/时/分）</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" id="genExpireDays" value="30" min="0" max="3650" style="width:80px" placeholder="天">
        <span>天</span>
        <input type="number" id="genExpireHours" value="0" min="0" max="23" style="width:70px" placeholder="时">
        <span>时</span>
        <input type="number" id="genExpireMinutes" value="0" min="0" max="59" style="width:70px" placeholder="分">
        <span>分</span>
      </div>
    </div>
    <div class="form-group">
      <label>生成数量 (1-100)</label>
      <input type="number" id="genCount" value="1" min="1" max="100">
    </div>
    <div id="genResult" class="cards-result" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('generateModal')" style="background:#e0e0e0">取消</button>
      <button class="btn btn-primary" onclick="doGenerate()">生成</button>
    </div>
  </div>
</div>

<!-- 导入卡密弹窗 -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>批量导入卡密</h3>
    <div class="form-group">
      <label>JSON 格式（每行一个）</label>
      <textarea id="importText" rows="8" style="width:100%;padding:8px;border:2px solid #e0e0e0;border-radius:6px;font-family:monospace;font-size:12px" placeholder='[{"card_key":"CARD-XXXX-XXXX-XXXX","expire_minutes":30}]'></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('importModal')" style="background:#e0e0e0">取消</button>
      <button class="btn btn-primary" onclick="doImport()">导入</button>
    </div>
  </div>
</div>

<!-- 白名单添加弹窗 -->
<div class="modal-overlay" id="whitelistAddModal">
  <div class="modal">
    <h3>添加IP白名单</h3>
    <div class="form-group">
      <label>CIDR 格式（如 192.168.1.0/24 或 127.0.0.1）</label>
      <input type="text" id="wlCidr" placeholder="192.168.1.0/24">
    </div>
    <div class="form-group">
      <label>描述</label>
      <input type="text" id="wlDesc" placeholder="办公室网络">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('whitelistAddModal')" style="background:#e0e0e0">取消</button>
      <button class="btn btn-primary" onclick="doAddWhitelist()">添加</button>
    </div>
  </div>
</div>

<script>
let API_BASE = '';
let ADMIN_KEY = localStorage.getItem('admin_key') || '';

function formatMinutes(minutes) {
  const d = Math.floor(minutes / 1440);
  const h = Math.floor((minutes % 1440) / 60);
  const m = minutes % 60;
  let s = '';
  if (d > 0) s += d + '天';
  if (h > 0) s += h + '时';
  if (m > 0 || s === '') s += m + '分';
  return s;
}

if (location.pathname.includes('/static/') || location.pathname.includes('/admin')) {
  API_BASE = location.origin;
} else {
  API_BASE = location.origin;
}

function api(url, opts = {}) {
  opts.headers = opts.headers || {};
  if (!(opts.body instanceof FormData)) {
    opts.headers['Content-Type'] = 'application/json';
    opts.headers['X-Admin-Key'] = ADMIN_KEY;
  }
  return fetch(API_BASE + url, opts).then(r => r.json());
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function switchTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'dashboard') loadStats();
  if (name === 'cards') loadCards();
  if (name === 'online') loadOnlineDevices();
  if (name === 'logs') loadLogs();
  if (name === 'whitelist') loadWhitelist();
}

async function doLogin() {
  const key = document.getElementById('adminKeyInput').value.trim();
  if (!key) return;
  const resp = await fetch(API_BASE + '/api/stats?admin_key=' + encodeURIComponent(key));
  const data = await resp.json();
  if (data.success) {
    ADMIN_KEY = key;
    localStorage.setItem('admin_key', key);
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
    loadStats();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('admin_key');
  location.reload();
}

document.getElementById('adminKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

if (ADMIN_KEY) {
  fetch(API_BASE + '/api/stats?admin_key=' + encodeURIComponent(ADMIN_KEY))
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainPage').style.display = 'block';
        loadStats();
      }
    });
}

async function loadStats() {
  const d = await api('/api/stats?admin_key=' + encodeURIComponent(ADMIN_KEY));
  if (!d.success) return;
  const s = d.stats;
  document.getElementById('statTotal').textContent = s.cards.total;
  document.getElementById('statActive').textContent = s.cards.activated;
  document.getElementById('statDisabled').textContent = s.cards.disabled;
  document.getElementById('statExpired').textContent = s.cards.expired;
  document.getElementById('statOnline').textContent = s.devices.online || 0;
  document.getElementById('statVerifySuccess').textContent = s.verifies.success;
}

let cardsOffset = 0;
const cardsLimit = 20;

async function loadCards() {
  const status = document.getElementById('filterStatus').value;
  const d = await api('/api/card/list', {
    method: 'POST',
    body: JSON.stringify({ status: status ? parseInt(status) : null, limit: cardsLimit, offset: cardsOffset, admin_key: ADMIN_KEY })
  });
  if (!d.success) return;
  const tbody = document.getElementById('cardsTable');
  const statusMap = { 0: '未使用', 1: '已激活', 2: '已禁用', 3: '已过期' };
  const statusClass = { 0: 'status-0', 1: 'status-1', 2: 'status-2', 3: 'status-3' };
  tbody.innerHTML = d.cards.map(c => {
    const validStr = c.expire_minutes ? formatMinutes(c.expire_minutes) : '-';
    const expireStr = c.expire_time ? new Date(c.expire_time * 1000).toLocaleString('zh-CN') : '-';
    return `<tr>
      <td><code style="background:#f5f5f5;padding:2px 6px;border-radius:4px;font-size:12px">${c.card_key}</code></td>
      <td><span class="status-badge ${statusClass[c.status]}">${statusMap[c.status]}</span></td>
      <td><span class="heartbeat-badge ${c.is_online ? 'online' : 'offline'}" id="hb-${c.card_key}">${c.is_online ? '🟢 在线' : '⚪ 离线'}</span></td>
      <td>${validStr}</td>
      <td>${expireStr}</td>
      <td><code style="font-size:11px">${c.device_sn || '-'}</code></td>
      <td>${c.created_at || '-'}</td>
      <td>
        <button class="btn btn-sm btn-warning" onclick="doToggle('${c.card_key}', ${c.status})">${c.status === 2 ? '启用' : '禁用'}</button>
        <button class="btn btn-sm btn-danger" style="margin-left:4px" onclick="doDelete('${c.card_key}')">删除</button>
      </td>
    </tr>`;
  }).join('');
  const pg = document.getElementById('cardsPagination');
  pg.innerHTML = '';
  if (cardsOffset > 0) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm';
    btn.textContent = '上一页';
    btn.onclick = () => { cardsOffset -= cardsLimit; loadCards(); };
    pg.appendChild(btn);
  }
  if (d.cards.length === cardsLimit) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm';
    btn.textContent = '下一页';
    btn.onclick = () => { cardsOffset += cardsLimit; loadCards(); };
    pg.appendChild(btn);
  }
  pg.insertAdjacentText('afterbegin', `共 ${d.count} 条  `);
}

async function doToggle(cardKey, currentStatus) {
  const newStatus = currentStatus === 2 ? 0 : 2;
  const d = await api('/api/card/toggle', {
    method: 'POST',
    body: JSON.stringify({ card_key: cardKey, status: newStatus, admin_key: ADMIN_KEY })
  });
  toast(d.message, d.success ? 'success' : 'error');
  if (d.success) loadCards();
}

async function doDelete(cardKey) {
  if (!confirm('确定删除该卡密？此操作不可恢复。')) return;
  const d = await api('/api/card/delete', {
    method: 'POST',
    body: JSON.stringify({ card_key: cardKey, admin_key: ADMIN_KEY })
  });
  toast(d.message, d.success ? 'success' : 'error');
  if (d.success) loadCards();
}

function showGenerateModal() {
  document.getElementById('genResult').style.display = 'none';
  document.getElementById('genResult').innerHTML = '';
  document.getElementById('generateModal').classList.add('active');
}

function showImportModal() {
  document.getElementById('importModal').classList.add('active');
}

async function doGenerate() {
  const days = parseInt(document.getElementById('genExpireDays').value) || 0;
  const hours = parseInt(document.getElementById('genExpireHours').value) || 0;
  const minutes = parseInt(document.getElementById('genExpireMinutes').value) || 0;
  const expire_minutes = days * 1440 + hours * 60 + minutes;
  if (expire_minutes <= 0) { toast('有效期必须大于0', 'error'); return; }
  const count = parseInt(document.getElementById('genCount').value);
  const d = await api('/api/card/generate', {
    method: 'POST',
    body: JSON.stringify({ expire_minutes, count, admin_key: ADMIN_KEY })
  });
  if (d.success) {
    const resultDiv = document.getElementById('genResult');
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `
      <div style="font-weight:600;margin-bottom:8px;">生成了 ${d.cards.length} 张卡密：</div>
      ${d.cards.map((c, i) => `
        <div class="card-item">
          <code>${c}</code>
          <button class="btn btn-sm btn-copy" onclick="copyCardKey(this, '${c}')">复制</button>
        </div>
      `).join('')}
      <div style="margin-top:12px;text-align:center">
        <button class="btn btn-primary btn-sm" onclick="copyAllCards(this)">全部复制</button>
      </div>
    `;
    loadStats();
    loadCards();
  } else {
    toast(d.message || '生成失败', 'error');
  }
}

function copyCardKey(btn, key) {
  function doCopy() {
    const ta = document.createElement('textarea');
    ta.value = key;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(key).then(() => {
      const orig = btn.textContent;
      btn.textContent = '已复制 ✓';
      setTimeout(() => btn.textContent = orig, 1500);
    }).catch(() => {
      // fallback for non-https
      if (doCopy()) {
        const orig = btn.textContent;
        btn.textContent = '已复制 ✓';
        setTimeout(() => btn.textContent = orig, 1500);
      } else {
        toast('复制失败，请手动复制', 'error');
      }
    });
  } else if (doCopy()) {
    const orig = btn.textContent;
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = orig, 1500);
  } else {
    toast('复制失败，请手动复制', 'error');
  }
}

function copyAllCards(btn) {
  const keys = Array.from(document.querySelectorAll('#genResult .card-item code')).map(e => e.textContent).join('\n');
  function doCopy() {
    const ta = document.createElement('textarea');
    ta.value = keys;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(keys).then(() => {
      const orig = btn.textContent;
      btn.textContent = '已复制全部 ✓';
      setTimeout(() => btn.textContent = orig, 1500);
    }).catch(() => {
      if (doCopy()) {
        const orig = btn.textContent;
        btn.textContent = '已复制全部 ✓';
        setTimeout(() => btn.textContent = orig, 1500);
      } else {
        toast('复制失败，请手动复制', 'error');
      }
    });
  } else if (doCopy()) {
    const orig = btn.textContent;
    btn.textContent = '已复制全部 ✓';
    setTimeout(() => btn.textContent = orig, 1500);
  } else {
    toast('复制失败，请手动复制', 'error');
  }
}

async function doImport() {
  const text = document.getElementById('importText').value.trim();
  try {
    const cards = JSON.parse(text);
    const d = await api('/api/card/import', {
      method: 'POST',
      body: JSON.stringify({ cards, admin_key: ADMIN_KEY })
    });
    closeModal('importModal');
    toast(d.message, d.success ? 'success' : 'error');
    if (d.success) { loadCards(); loadStats(); }
  } catch (e) {
    toast('JSON 格式错误', 'error');
  }
}

async function doExport() {
  const status = document.getElementById('filterStatus').value;
  const body = { admin_key: ADMIN_KEY, status: status ? parseInt(status) : null, limit: 1000, offset: 0 };
  const resp = await fetch(API_BASE + '/api/card/export', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
    body: JSON.stringify(body)
  });
  const blob = await resp.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cards_export.csv';
  a.click();
  toast('导出成功');
}

async function loadLogs() {
  const d = await api('/api/admin/logs?admin_key=' + encodeURIComponent(ADMIN_KEY) + '&limit=200');
  if (!d.success) return;
  const tbody = document.getElementById('logsTable');
  tbody.innerHTML = d.logs.map(l => `
    <tr>
      <td>${l.created_at || '-'}</td>
      <td><code style="font-size:11px">${l.admin_key_hash || '-'}</code></td>
      <td><span class="tag">${l.action}</span></td>
      <td>${l.detail || '-'}</td>
      <td>${l.ip_address || '-'}</td>
    </tr>
  `).join('');
}

async function loadOnlineDevices() {
  const d = await api('/api/client/online-devices?admin_key=' + encodeURIComponent(ADMIN_KEY));
  if (!d.success) return;
  const tbody = document.getElementById('onlineTable');
  const emptyDiv = document.getElementById('onlineEmpty');
  if (d.devices.length === 0) {
    tbody.innerHTML = '';
    emptyDiv.style.display = 'block';
    return;
  }
  emptyDiv.style.display = 'none';
  tbody.innerHTML = d.devices.map(d => {
    const remaining = d.expire_time ? Math.max(0, d.expire_time - Math.floor(Date.now()/1000)) : 0;
    const hours = Math.floor(remaining / 3600);
    const minutes = Math.floor((remaining % 3600) / 60);
    const timeStr = hours > 0 ? `${hours}小时${minutes}分` : `${minutes}分钟`;
    const hbTime = d.last_heartbeat ? new Date(d.last_heartbeat).toLocaleTimeString('zh-CN') : '-';
    const cardStatusMap = { 0: '未使用', 1: '已激活', 2: '已禁用', 3: '已过期' };
    return `
      <tr>
        <td><span class="online-dot online"></span>在线</td>
        <td><code style="font-size:12px">${d.device_sn}</code></td>
        <td>${d.ip_address || '-'}</td>
        <td><code style="font-size:12px">${d.card_key || '-'}</code></td>
        <td>${cardStatusMap[d.card_status] || '-'}</td>
        <td>${remaining > 0 ? timeStr : '已过期'}</td>
        <td>${hbTime}</td>
      </tr>
    `;
  }).join('');
  // 更新仪表盘在线数
  document.getElementById('statOnline').textContent = d.devices.length;
}

async function loadWhitelist() {
  const d = await api('/api/config/whitelist/list?admin_key=' + encodeURIComponent(ADMIN_KEY));
  if (!d.success) return;
  document.getElementById('whitelistStatus').textContent = '白名单：' + (d.enabled ? '🟢 已开启' : '⚪ 未开启');
  const tbody = document.getElementById('whitelistTable');
  tbody.innerHTML = d.whitelist.map(w => `
    <tr>
      <td><code>${w.ip_cidr}</code></td>
      <td>${w.description || '-'}</td>
      <td>${w.created_at || '-'}</td>
      <td><button class="btn btn-sm btn-danger" onclick="doRemoveWhitelist('${w.ip_cidr}')">删除</button></td>
    </tr>
  `).join('');
}

function showWhitelistAddModal() { document.getElementById('whitelistAddModal').classList.add('active'); }

async function doAddWhitelist() {
  const ip_cidr = document.getElementById('wlCidr').value.trim();
  const description = document.getElementById('wlDesc').value.trim();
  const d = await api('/api/config/whitelist/add', {
    method: 'POST',
    body: JSON.stringify({ ip_cidr, description, admin_key: ADMIN_KEY })
  });
  closeModal('whitelistAddModal');
  toast(d.message, d.success ? 'success' : 'error');
  if (d.success) loadWhitelist();
}

async function doRemoveWhitelist(ip_cidr) {
  if (!confirm('确定删除该白名单条目？')) return;
  const d = await api('/api/config/whitelist/remove', {
    method: 'POST',
    body: JSON.stringify({ ip_cidr, admin_key: ADMIN_KEY })
  });
  toast(d.message, d.success ? 'success' : 'error');
  if (d.success) loadWhitelist();
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('active'); });
});

// 自动刷新在线设备
setInterval(() => {
  const onlineTab = document.getElementById('tab-online');
  if (onlineTab && onlineTab.classList.contains('active')) {
    loadOnlineDevices();
  }
}, 10000);
</script>
